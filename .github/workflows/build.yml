name: Build and Release Game Executables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller (demo.py)
        run: pyinstaller --onefile --console --name "ChillingAdventures" demo.py

      # On Windows, convert backslashes to forward slashes for the release uploader
      - name: Prepare Windows executable
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path .\dist\ChillingAdventures.exe -Destination .\dist\ChillingAdventures-Windows.exe
          $FILE_PATH = "dist/ChillingAdventures-Windows.exe"
          echo "FILE_PATH=$FILE_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare macOS executable
        if: runner.os == 'macOS'
        run: |
          mv dist/ChillingAdventures dist/ChillingAdventures-macOS
          echo "FILE_PATH=dist/ChillingAdventures-macOS" >> $GITHUB_ENV

      - name: Prepare Linux executable
        if: runner.os == 'Linux'
        run: |
          mv dist/ChillingAdventures dist/ChillingAdventures-Linux
          echo "FILE_PATH=dist/ChillingAdventures-Linux" >> $GITHUB_ENV

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FILE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
